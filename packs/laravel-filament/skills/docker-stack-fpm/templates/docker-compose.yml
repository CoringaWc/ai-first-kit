# generated by docker-stack-fpm
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        WWWGROUP: ${WWWGROUP:-1000}
        WWWUSER: ${WWWUSER:-1000}
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_SERVICE: ${APP_SERVICE:-app}
      WWWGROUP: ${WWWGROUP:-1000}
      WWWUSER: ${WWWUSER:-1000}
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - {{PROJECT_NAME}}

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        WWWGROUP: ${WWWGROUP:-1000}
        WWWUSER: ${WWWUSER:-1000}
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_SERVICE: ${APP_SERVICE:-app}
      WWWGROUP: ${WWWGROUP:-1000}
      WWWUSER: ${WWWUSER:-1000}
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=900", "--max-time=3600"]
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-lc", "grep -qa 'queue:work' /proc/1/cmdline"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - {{PROJECT_NAME}}

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        WWWGROUP: ${WWWGROUP:-1000}
        WWWUSER: ${WWWUSER:-1000}
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_SERVICE: ${APP_SERVICE:-app}
      WWWGROUP: ${WWWGROUP:-1000}
      WWWUSER: ${WWWUSER:-1000}
    command: ["php", "artisan", "reverb:start"]
    volumes:
      - ./:/var/www/html
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 8080) ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - {{PROJECT_NAME}}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_HTTP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH:-./docker/nginx/certs}:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
      reverb:
        condition: service_healthy
    networks:
      - {{PROJECT_NAME}}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-template}
      POSTGRES_USER: ${DB_USERNAME:-template}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-template} -d ${DB_DATABASE:-template}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - {{PROJECT_NAME}}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - {{PROJECT_NAME}}

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    profiles:
      - storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    ports:
      - "${FORWARD_MINIO_PORT:-9000}:9000"
      - "${FORWARD_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - {{PROJECT_NAME}}

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - ai
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: ${OLLAMA_KV_CACHE_TYPE:-q4_0}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-32768}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - {{PROJECT_NAME}}

  ollama-pull-models:
    image: ollama/ollama:latest
    profiles:
      - ai
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
      ollama pull gemma3:4b-it-q4_K_M &&
      ollama pull snowflake-arctic-embed:22m &&
      ollama pull qwen3:4b-instruct
      "
    networks:
      - {{PROJECT_NAME}}

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    profiles:
      - ai
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - {{PROJECT_NAME}}

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles:
      - dev
    environment:
      MP_WEBROOT: mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1026}:1025"
      - "${MAILPIT_DASHBOARD_PORT:-8026}:8025"
    networks:
      - {{PROJECT_NAME}}

networks:
  {{PROJECT_NAME}}:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  qdrant_data:
